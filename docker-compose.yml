version: '3.8'

services:
  sync-engine:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: meshsats
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
